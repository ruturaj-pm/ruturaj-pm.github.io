                    <td className="p-1.5 font-semibold" dangerouslySetInnerHTML={{__html:r[2]}}></td>
                    <td className="p-1.5 text-slate-500">{r[3]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </AppShell>
  );
}

/*─────────────────────────────────────────────────────────────────────

  { id:"empty", group:"Home", name:"New Project", desc:"Empty state · prompt-first scaffold", component:Screen_Empty },

];

/*─────────────────────────────────────────────────────────────────────
  FIGMA-STYLE BROWSER SHELL
─────────────────────────────────────────────────────────────────────*/
function Browser(){
  const [active, setActive] = useState("dashboard");
  const [zoom, setZoom] = useState(0.78);
  const cur = SCREENS.find(s=>s.id===active);
  const Cur = cur.component;
  const groups = Array.from(new Set(SCREENS.map(s=>s.group)));

  // Keyboard nav
  useEffect(()=>{
    const h = (e)=>{
      if (e.key==="ArrowRight" || e.key==="j") {
        const i = SCREENS.findIndex(s=>s.id===active);
        setActive(SCREENS[(i+1)%SCREENS.length].id);
      } else if (e.key==="ArrowLeft" || e.key==="k") {
        const i = SCREENS.findIndex(s=>s.id===active);
        setActive(SCREENS[(i-1+SCREENS.length)%SCREENS.length].id);
      } else if (e.key==="+") setZoom(z=>Math.min(1.1, z+0.05));
      else if (e.key==="-") setZoom(z=>Math.max(0.4, z-0.05));
      else if (e.key==="0") setZoom(0.78);
    };
    window.addEventListener("keydown", h);
    return ()=>window.removeEventListener("keydown", h);
  },[active]);

  return (
    <div className="flex h-full">
      {/* Left — Screens panel */}
      <aside className="w-72 bg-[#0f1218] border-r border-white/5 flex flex-col shrink-0">
        <div className="p-4 border-b border-white/5">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg gradient-ind text-white font-bold flex items-center justify-center text-xs">R</div>
            <div>
              <div className="font-semibold text-sm text-white">RPOS · Visual Mock</div>
              <div className="text-[10px] text-slate-400">Rutu's Product OS · clickable screens</div>
            </div>
          </div>
          <div className="mt-3 relative">
            <Icon name="search" className="w-3.5 h-3.5 absolute top-1/2 -translate-y-1/2 left-2 text-slate-500"/>
            <input placeholder="Search screens…" className="w-full pl-7 pr-2 py-1.5 text-xs rounded bg-[#1a1f27] text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"/>
          </div>
        </div>
        <div className="flex-1 overflow-auto scroll-thin px-2 py-3">
          {groups.map(g=>(
            <div key={g} className="mb-4">
              <div className="px-2 py-1 text-[10px] font-bold uppercase tracking-widest text-slate-500">{g}</div>
              <div className="mt-1 space-y-0.5">
                {SCREENS.filter(s=>s.group===g).map(s=>(
                  <button key={s.id} onClick={()=>setActive(s.id)}
                    className={cls("screen-card w-full text-left px-2 py-1.5 rounded-md text-[12px]", active===s.id?"active text-white":"text-slate-300")}>
                    <div className="flex items-center gap-2">
                      <span className="w-4 h-4 rounded-sm border border-white/10 bg-white/5"></span>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium truncate">{s.name}</div>
                        <div className="text-[10px] text-slate-500 truncate">{s.desc}</div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="border-t border-white/5 p-3 text-[10px] text-slate-500 leading-relaxed">
          <div>Use <span className="kbd">←</span> <span className="kbd">→</span> to navigate.</div>
          <div><span className="kbd">+</span>/<span className="kbd">−</span> zoom · <span className="kbd">0</span> reset.</div>
        </div>
      </aside>

      {/* Center — canvas */}
      <div className="flex-1 canvas-bg dot-bg flex flex-col min-w-0">
        <div className="h-11 border-b border-white/5 flex items-center px-4 gap-3 text-slate-300 text-xs">
          <div className="flex items-center gap-2">
            <button onClick={()=>{const i=SCREENS.findIndex(s=>s.id===active);setActive(SCREENS[(i-1+SCREENS.length)%SCREENS.length].id)}} className="w-7 h-7 rounded bg-white/5 hover:bg-white/10 flex items-center justify-center"><Icon name="chevron" className="w-3.5 h-3.5 rotate-180"/></button>
            <button onClick={()=>{const i=SCREENS.findIndex(s=>s.id===active);setActive(SCREENS[(i+1)%SCREENS.length].id)}} className="w-7 h-7 rounded bg-white/5 hover:bg-white/10 flex items-center justify-center"><Icon name="chevron" className="w-3.5 h-3.5"/></button>
          </div>
          <div className="font-medium text-slate-200">{cur.name}</div>
          <div className="text-slate-500">·</div>
          <div className="text-slate-500 truncate flex-1">{cur.desc}</div>
          <div className="flex items-center gap-1 ml-auto">
            <button onClick={()=>setZoom(z=>Math.max(0.4,z-0.05))} className="w-7 h-7 rounded bg-white/5 hover:bg-white/10 flex items-center justify-center">−</button>
            <div className="w-14 text-center text-[11px] font-mono">{Math.round(zoom*100)}%</div>
            <button onClick={()=>setZoom(z=>Math.min(1.1,z+0.05))} className="w-7 h-7 rounded bg-white/5 hover:bg-white/10 flex items-center justify-center">+</button>
            <button onClick={()=>setZoom(0.78)} className="px-2 h-7 rounded bg-white/5 hover:bg-white/10 text-[11px]">Fit</button>
          </div>
        </div>
        <div className="flex-1 overflow-auto scroll-thin p-8 flex items-start justify-center">
          <div style={{transform:`scale(${zoom})`, transformOrigin:"top center"}} className="transition-transform">
            <div style={{width:1440}} className="rounded-xl overflow-hidden">
              <Frame title={"rpos.app · " + cur.name}>
                <Cur />
              </Frame>
            </div>
          </div>
        </div>
      </div>

      {/* Right — inspector */}
      <aside className="w-72 bg-[#0f1218] border-l border-white/5 flex flex-col shrink-0">
        <div className="p-4 border-b border-white/5 text-[11px] uppercase tracking-widest text-slate-500">Inspector</div>
        <div className="p-4 text-slate-300 text-[12px] space-y-3">
          <div>
            <div className="text-[10px] uppercase text-slate-500">Screen</div>
            <div className="font-semibold text-white">{cur.name}</div>
            <div className="text-[11px] text-slate-400">{cur.group}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Purpose</div>
            <div>{cur.desc}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Dimensions</div>
            <div className="font-mono">1440 × 900</div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Design tokens</div>
            <div className="flex gap-1 mt-1">
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#6366F1"}} title="Accent"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#22D3EE"}} title="Accent 2"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#0B1020"}} title="Ink"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#F6F7FB"}} title="Surface"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#10B981"}} title="Good"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#F59E0B"}} title="Warn"></div>
              <div className="w-5 h-5 rounded border border-white/10" style={{background:"#EF4444"}} title="Bad"></div>
            </div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Fonts</div>
            <div>Inter · system-ui fallback</div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Data source</div>
            <div>CSPO Grocery Online · seed v1</div>
          </div>
          <div>
            <div className="text-[10px] uppercase text-slate-500">Notes</div>
            <div className="text-slate-400">Static mock for stakeholder walk-through. The working prototype lives in <span className="font-mono text-white">RPOS_Prototype.html</span>.</div>
          </div>
        </div>
        <div className="mt-auto p-4 border-t border-white/5">
          <a href="RPOS_Prototype.html" className="block w-full text-center px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold">Open working prototype →</a>
        </div>
      </aside>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Browser />);
</script>
</body>
</html>
