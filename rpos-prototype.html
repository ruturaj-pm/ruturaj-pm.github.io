async function callLLM({ prompt, fallback, system }) {
  const apiKey = (typeof window !== "undefined" && window.ANTHROPIC_API_KEY) || null;
  if (!apiKey) {
    // Simulate async for realistic UX (spinner etc.)
    await new Promise(r => setTimeout(r, 350));
    return { text: typeof fallback === "function" ? fallback() : fallback, source: "hardcoded" };

  // const res = await fetch("/api/llm", { method:"POST", body: JSON.stringify({ system, prompt }) });

}

function generatePRD(p){
  const today = new Date().toISOString().slice(0,10);
  const { problem, strategy, personas, stories, backlog, storyMap, wireframes, flows, sprints, execution, architecture, tests, release, kpis, name } = p;
  const L = [];
  L.push(`# Product Requirements Document — ${name}`);
  L.push(`*Auto-generated by RPOS · ${today}*`);
  L.push("");
  L.push(`## 1. Problem & Opportunity`);
  L.push(problem.statement || "_(not set)_");
  L.push("");
  L.push(`**Target Users:** ${problem.targetUsers || "—"}`);
  L.push(`**Market Size:** ${problem.marketSize || "—"}`);
  if ((problem.hypotheses||[]).length){ L.push(""); L.push(`**Hypotheses**`); problem.hypotheses.forEach(h=>L.push(`- ${h}`)); }
  if ((problem.assumptions||[]).length){ L.push(""); L.push(`**Key Assumptions**`); problem.assumptions.forEach(a=>L.push(`- ${a}`)); }
  L.push("");
  L.push(`## 2. Vision & Strategy`);
  L.push(`### Vision`); L.push(strategy.vision || "_(not set)_");
  L.push(`### Value Proposition`); L.push(strategy.valueProp || "_(not set)_");
  L.push(`### Elevator Pitch`); L.push(strategy.elevatorPitch || "_(not set)_");
  L.push(`### Business Goals`);
  (strategy.businessGoals||[]).forEach(g => L.push(`- ${g}`));
  if (strategy.northStar) { L.push(""); L.push(`**North-Star Metric:** ${strategy.northStar}`); }
  L.push("");
  L.push(`## 3. Target Personas`);
  personas.forEach((pp,i)=>{
    L.push(`### 3.${i+1} ${pp.name}`);
    L.push(`**Role:** ${pp.role}  |  **Age:** ${pp.age}  |  **Location:** ${pp.location}`);
    L.push(`**Demographics:** ${pp.demographics}`);
    L.push(`**Goals:**`); pp.goals.forEach(g=>L.push(`- ${g}`));
    L.push(`**Pain Points:**`); pp.painPoints.forEach(g=>L.push(`- ${g}`));
    L.push(`**Empathy Map — Think / Feel / Say / Do:**`);
    L.push(`- **Think:** ${pp.empathy.think}`);
    L.push(`- **Feel:** ${pp.empathy.feel}`);
    L.push(`- **Say:** ${pp.empathy.say}`);
    L.push(`- **Do:** ${pp.empathy.do}`);
    L.push("");
  });
  L.push(`## 4. Feature List & User Stories`);
  const byEpic = {};
  stories.forEach(s => { byEpic[s.epic] = byEpic[s.epic] || []; byEpic[s.epic].push(s); });
  Object.entries(byEpic).forEach(([epic, ss])=>{
    L.push(`### Epic — ${epic}`);
    ss.forEach(s=>{
      L.push(`**${s.id} · ${s.priority} · ${s.points} pts · ${s.status}**`);
      L.push(`> ${s.story}`);
      L.push(`_Persona: ${s.persona}_`);
      L.push(`**Acceptance Criteria**`);
      s.ac.forEach(a=>L.push(`- **GIVEN** ${a.given} · **WHEN** ${a.when} · **THEN** ${a.then}`));
      L.push("");
    });
  });
  L.push(`## 5. Release Plan (Story Map)`);
  storyMap.swimlanes.forEach(sw=>{
    L.push(`### ${sw.release}`);
    storyMap.activities.forEach((a, i)=>{
      L.push(`- **${a}:** ${(sw.tasks[i]||[]).join(", ") || "—"}`);
    });
    L.push("");
  });
  L.push(`## 6. Backlog Snapshot`);
  L.push(`| ID | Title | Epic | Priority | Pts | Status |`);
  L.push(`|---|---|---|---|---|---|`);
  backlog.forEach(b=>L.push(`| ${b.id} | ${b.title} | ${b.epic} | ${b.priority} | ${b.pts} | ${b.status} |`));
  L.push("");
  if ((wireframes||[]).length){
    L.push(`## 7. Design — Wireframes & Flows`);
    L.push(`### Wireframes`);
    L.push(`| ID | Screen | Persona | Status | Notes |`);
    L.push(`|---|---|---|---|---|`);
    wireframes.forEach(w=>L.push(`| ${w.id} | ${w.screen} | ${w.persona} | ${w.status} | ${w.notes} |`));
    L.push("");
    L.push(`### User Flows`);
    flows.forEach(f=>L.push(`- **${f.name}** → ${(f.steps||[]).join(" → ")}`));
    L.push("");
  }
  if ((sprints||[]).length || (architecture && architecture.summary)){
    L.push(`## 8. Delivery — Sprints & Architecture`);
    if ((sprints||[]).length){
      L.push(`### Sprint Plan`);
      L.push(`| Sprint | Dates | Capacity | Committed | Items | Status |`);
      L.push(`|---|---|---|---|---|---|`);
      sprints.forEach(s=>L.push(`| ${s.name} | ${s.dates} | ${s.capacity} | ${s.committed} | ${(s.items||[]).join(", ")} | ${s.status} |`));
      L.push("");
    }
    if (architecture && architecture.summary){
      L.push(`### Architecture Summary`);
      L.push(architecture.summary);
      if ((architecture.stack||[]).length){
        L.push("");
        L.push(`**Stack**`);
        architecture.stack.forEach(s=>L.push(`- **${s.layer}** — ${s.tech}`));
      }
      if ((architecture.risks||[]).length){
        L.push("");
        L.push(`**Technical Risks**`);
        architecture.risks.forEach(r=>L.push(`- **${r.id}** ${r.risk} — _mitigation:_ ${r.mitigation}`));
      }
      L.push("");
    }
  }
  if ((execution||[]).length){
    // Roll up execution stats
    const plans = execution;
    const allTasks = plans.flatMap(pl=>pl.tasks||[]);
    const allRisks = plans.flatMap(pl=>(pl.risks||[]).filter(r=>!r.dismissed));
    const total = allTasks.length;
    const done  = allTasks.filter(t=>t.status==="Done").length;
    const prog  = allTasks.filter(t=>t.status==="In Progress").length;
    const blk   = allTasks.filter(t=>t.status==="Blocked").length;
    const pct   = total ? Math.round((done/total)*100) : 0;
    const byFn = {};
    allTasks.forEach(t=>{ byFn[t.fn] = (byFn[t.fn]||0)+1; });
    L.push(`## 8a. Execution Status — AI Project Manager`);
    L.push(`_Cross-functional breakdown auto-generated by RPOS AI PM. Confidence and ownership tracked per task._`);
    L.push("");
    L.push(`**Overall progress:** ${done}/${total} tasks Done (${pct}%) · ${prog} In Progress · ${blk} Blocked · ${allRisks.length} open risk${allRisks.length===1?"":"s"}`);
    L.push("");
    L.push(`### Workstream Load`);
    L.push(`| Function | Tasks |`);
    L.push(`|---|---|`);
    Object.entries(byFn).sort((a,b)=>b[1]-a[1]).forEach(([fn,n])=>L.push(`| ${fn} | ${n} |`));
    L.push("");
    L.push(`### Per-Story Plans`);
    L.push(`| Story | Tasks | Done | Blocked | Confidence |`);
    L.push(`|---|---|---|---|---|`);
    plans.forEach(pl=>{
      const t = pl.tasks||[];
      const d = t.filter(x=>x.status==="Done").length;
      const b = t.filter(x=>x.status==="Blocked").length;
      L.push(`| ${pl.storyId} | ${t.length} | ${d} | ${b} | ${pl.confidence||"—"} |`);
    });
    L.push("");
    if (allRisks.length){
      L.push(`### Open Risks & Blockers`);
      allRisks.sort((a,b)=>{ const o={high:0,med:1,low:2}; return (o[a.sev]??3)-(o[b.sev]??3); }).forEach(r=>{
        L.push(`- **[${(r.sev||"").toUpperCase()}] ${r.type||"risk"}** — ${r.msg}  _mitigation:_ ${r.mit||"—"}`);
      });
      L.push("");
    }
  }
  if ((tests||[]).length){
    L.push(`## 9. QA — Test Plan & Coverage`);
    L.push(`| Test ID | Story | Type | Result | Owner | Last Run |`);
    L.push(`|---|---|---|---|---|---|`);
    tests.forEach(t=>L.push(`| ${t.id} | ${t.storyRef} | ${t.type} | ${t.result} | ${t.owner} | ${t.run} |`));
    L.push("");
  }
  if (release && (release.releases||[]).length){
    L.push(`## 10. Deployment & Release Plan`);
    L.push(`| Release | Date | Channel | Scope | Risk |`);
    L.push(`|---|---|---|---|---|`);
    release.releases.forEach(r=>L.push(`| ${r.name} | ${r.date} | ${r.channel} | ${r.scope} | ${r.risk} |`));
    if ((release.rollout||[]).length){
      L.push("");
      L.push(`**Rollout Steps**`);
      release.rollout.forEach(s=>L.push(`- ${s}`));
    }
    L.push("");
  }
  if ((kpis||[]).length){
    L.push(`## 11. Post-Launch KPIs`);
    L.push(`| KPI | Target | Current | Trend | Owner |`);
    L.push(`|---|---|---|---|---|`);
    kpis.forEach(k=>L.push(`| ${k.name} | ${k.target} | ${k.current} | ${k.trend} | ${k.owner} |`));
    L.push("");
  }
  L.push(`---`);
  L.push(`_RPOS auto-compiles this PRD from every module — edit any input and this document updates in real time._`);
  return L.join("\n");
}

/* Simple markdown → HTML for preview pane */
function md2html(md){
  let h = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^### (.*)$/gm,"<h3>$1</h3>")
    .replace(/^## (.*)$/gm,"<h2>$1</h2>")
    .replace(/^# (.*)$/gm,"<h1>$1</h1>")
    .replace(/^\> (.*)$/gm,"<blockquote style='border-left:3px solid #C7D2FE;margin:4px 0;padding:4px 10px;color:#475569;background:#F8FAFF'>$1</blockquote>")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/\_(.*?)\_/g,"<em>$1</em>");
  h = h.replace(/((?:^\|.*\|\s*\n)+)/gm, block=>{
    const rows = block.trim().split("\n").map(r=>r.slice(1,-1).split("|").map(x=>x.trim()));
    if(rows.length<2) return block;
    const head = rows[0]; const body = rows.slice(2);
    return `<table><thead><tr>${head.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  h = h.replace(/(?:^- .*(?:\n|$))+/gm, block=>{
    const items = block.trim().split("\n").map(l=>l.replace(/^- /,""));
    return `<ul>${items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
  });
  h = h.split(/\n{2,}/).map(p=>{
    if (/^<(h1|h2|h3|ul|table|blockquote)/.test(p.trim())) return p;
    if (!p.trim()) return "";
    return `<p>${p.replace(/\n/g,"<br/>")}</p>`;
  }).join("\n");
  return h;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportAs(type, ctx){
  const { prd, project } = ctx;
  const safe = (project.name||"project").replace(/\s+/g,"_");

  if (type === "md") {
    downloadBlob(new Blob([prd], {type:"text/markdown"}), `${safe}_PRD.md`);
    return Promise.resolve(`Exported ${safe}_PRD.md`);
  }
  if (type === "doc") {
    const html = `<html><head><meta charset="utf-8"></head><body>${md2html(prd)}</body></html>`;
    downloadBlob(new Blob([html], {type:"application/msword"}), `${safe}_PRD.doc`);
    return Promise.resolve(`Exported ${safe}_PRD.doc`);
  }
  if (type === "docx") {
    // Word opens .doc-style HTML fine when wrapped as .docx fragment + MSO meta
    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
        xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="utf-8"><title>${project.name} PRD</title></head>
      <body>${md2html(prd)}</body></html>`;
    downloadBlob(new Blob(["\ufeff", html], {type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"}), `${safe}_PRD.docx`);
    return Promise.resolve(`Exported ${safe}_PRD.docx`);
  }
  if (type === "xlsx") {
    if (!window.XLSX) return Promise.reject("XLSX library not loaded");
    const wb = XLSX.utils.book_new();
    const backlogRows = [["ID","Title","Epic","Priority","Pts","Status","Rank"], ...project.backlog.map(b=>[b.id,b.title,b.epic,b.priority,b.pts,b.status,b.rank])];
    const storyRows = [["ID","Epic","Persona","Priority","Pts","Status","Story","# AC"], ...project.stories.map(s=>[s.id,s.epic,s.persona,s.priority,s.points,s.status,s.story,(s.ac||[]).length])];
    const personaRows = [["ID","Name","Role","Age","Location","Tags"], ...project.personas.map(p=>[p.id,p.name,p.role,p.age,p.location,(p.tags||[]).join(", ")])];
    const kpiRows = [["ID","KPI","Target","Current","Trend","Owner"], ...project.kpis.map(k=>[k.id,k.name,k.target,k.current,k.trend,k.owner])];
    const testRows = [["ID","Story","Title","Type","Result","Owner","Last Run"], ...project.tests.map(t=>[t.id,t.storyRef,t.title,t.type,t.result,t.owner,t.run])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(backlogRows), "Backlog");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(storyRows), "Stories");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(personaRows), "Personas");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kpiRows), "KPIs");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(testRows), "Tests");
    XLSX.writeFile(wb, `${safe}_workspace.xlsx`);
    return Promise.resolve(`Exported ${safe}_workspace.xlsx`);
  }
  if (type === "pptx") {
    if (!window.PptxGenJS) return Promise.reject("PptxGenJS not loaded");
    const pptx = new PptxGenJS();
    pptx.layout = "LAYOUT_WIDE";
    // Cover
    const s0 = pptx.addSlide();
    s0.background = { color: "0B1020" };
    s0.addText(project.name, { x:0.6, y:2.2, w:12, h:1.2, color:"FFFFFF", fontSize:44, bold:true, fontFace:"Inter" });
    s0.addText("Product Requirements Document", { x:0.6, y:3.5, w:12, h:0.6, color:"CBD5EF", fontSize:22, fontFace:"Inter" });
    s0.addText(`Auto-generated by RPOS · ${new Date().toISOString().slice(0,10)}`, { x:0.6, y:4.2, w:12, h:0.5, color:"94A3B8", fontSize:14, fontFace:"Inter" });
    // Split PRD by ## headings
    const sections = prd.split(/\n(?=## )/g);
    sections.forEach((sec,idx)=>{
      if (idx===0 && !sec.startsWith("## ")) return; // skip cover block
      const lines = sec.split("\n");
      const title = (lines.shift()||"").replace(/^##\s*/,"");
      const body  = lines.join("\n").replace(/^#{1,3}\s*/gm,"").replace(/\*\*/g,"").replace(/\|/g," · ").replace(/^- /gm,"• ").replace(/---+/g,"").trim();
      const slide = pptx.addSlide();
      slide.addText(title, { x:0.5, y:0.35, w:12.5, h:0.8, color:"0B1020", fontSize:28, bold:true, fontFace:"Inter" });
      slide.addShape(pptx.ShapeType.rect, { x:0.5, y:1.1, w:12.5, h:0.03, fill:{color:"6366F1"} });
      slide.addText(body.slice(0, 2800), { x:0.5, y:1.3, w:12.5, h:6.0, color:"334155", fontSize:14, fontFace:"Inter", valign:"top", shrinkText:true });
    });
    return pptx.writeFile({ fileName: `${safe}_PRD.pptx` }).then(()=>`Exported ${safe}_PRD.pptx`);
  }
  if (type === "pdf") {
    if (!window.jspdf || !window.html2canvas) return Promise.reject("PDF engine not loaded");
    const wrapper = document.createElement("div");
    wrapper.style.cssText = "position:fixed;left:-99999px;top:0;width:820px;background:#fff;padding:32px;font-family:Inter,system-ui,sans-serif;color:#0B1020";
    wrapper.innerHTML = `<div class="prd">${md2html(prd)}</div>`;
    // minimal inline PRD styles (since the offscreen node is outside the React tree but Tailwind utility classes we used live in .prd CSS)
    const style = document.createElement("style");
    style.textContent = `
      .prd h1{font-size:24px;font-weight:700;margin:0 0 12px}
      .prd h2{font-size:18px;font-weight:700;margin:18px 0 8px;border-bottom:1px solid #E5E7EB;padding-bottom:4px}
      .prd h3{font-size:15px;font-weight:700;margin:12px 0 4px;color:#334155}
      .prd p{margin:4px 0;line-height:1.55;color:#334155;font-size:13px}
      .prd ul{padding-left:20px;list-style:disc;color:#334155;font-size:13px}
      .prd blockquote{border-left:3px solid #C7D2FE;margin:4px 0;padding:4px 10px;color:#475569;background:#F8FAFF;font-size:13px}
      .prd table{border-collapse:collapse;margin:6px 0;font-size:12px;width:100%}
      .prd th,.prd td{border:1px solid #E5E7EB;padding:4px 8px;text-align:left}
      .prd th{background:#F1F5F9}
    `;
    wrapper.prepend(style);
    document.body.appendChild(wrapper);
    return html2canvas(wrapper, { scale: 2, backgroundColor:"#ffffff", windowWidth: 820 }).then(canvas=>{
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit:"pt", format:"a4" });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgW = pageW;
      const imgH = canvas.height * pageW / canvas.width;
      let heightLeft = imgH;
      let position = 0;
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, position, imgW, imgH);
      heightLeft -= pageH;
      while (heightLeft > 0){
        position -= pageH;
        pdf.addPage();
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, position, imgW, imgH);
        heightLeft -= pageH;
      }
      pdf.save(`${safe}_PRD.pdf`);
      document.body.removeChild(wrapper);
      return `Exported ${safe}_PRD.pdf`;
    });
  }
  return Promise.reject(`Unknown export type: ${type}`);
}

function StoriesModule({ stories, setStories, personas }){
  const [filter, setFilter] = useState("");
  const [sortBy, setSortBy] = useState("id");
  const addStory = ()=>setStories([{
    id:uid("US"), epic:"New Epic", persona: personas[0]?.name || "—",
    story:"As a [user], I want [action] so that [benefit]",
    priority:"Should", points:3, status:"Backlog",
    ac:[{given:"",when:"",then:""}]
  }, ...stories]);

  const filtered = stories
    .filter(s => (s.id + " " + s.epic + " " + s.story).toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b)=>{
      if (sortBy==="points") return b.points - a.points;
      if (sortBy==="priority") return ["Must","Should","Could","Wont"].indexOf(a.priority)-["Must","Should","Could","Wont"].indexOf(b.priority);
      return a.id.localeCompare(b.id);
    });

  const totalPts = stories.reduce((a,s)=>a+(+s.points||0),0);
  const doneP = stories.filter(s=>s.status==="Done").reduce((a,s)=>a+s.points,0);
  const pct = totalPts? Math.round(doneP/totalPts*100):0;

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div>
          <h2 className="text-xl font-bold text-slate-900">User Stories</h2>
          <p className="text-sm text-slate-500">{stories.length} stories · {totalPts} pts total · {pct}% done</p>
        </div>
        <div className="flex items-center gap-2">
          <Select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="!w-40 !py-1.5 !text-xs">
            <option value="id">Sort: ID</option>
            <option value="priority">Sort: Priority</option>
            <option value="points">Sort: Points</option>
          </Select>
          <div className="relative">
            <Icon name="search" className="w-4 h-4 absolute top-1/2 -translate-y-1/2 left-2.5 text-slate-400"/>
            <Input placeholder="Filter..." value={filter} onChange={e=>setFilter(e.target.value)} className="!pl-8 !py-1.5"/>
          </div>
          <Btn icon={<Icon name="plus"/>} onClick={addStory}>Add story</Btn>
        </div>
      </div>
      <div className="h-2 bg-slate-200 rounded-full overflow-hidden mb-4">
        <div className="h-full bg-gradient-to-r from-indigo-500 to-cyan-500" style={{width:pct+"%"}}></div>
      </div>
      <div className="space-y-2">
        {filtered.map(s=>(
          <StoryRow key={s.id} story={s} personas={personas}
            onChange={ns=>setStories(stories.map(x=>x.id===s.id?ns:x))}
            onDelete={()=>setStories(stories.filter(x=>x.id!==s.id))}
          />
        ))}
      </div>
    </div>
  );
}

/*─────────────────────────────────────────────────────────────────────
  BACKLOG MODULE (Kanban)
─────────────────────────────────────────────────────────────────────*/
function BacklogModule({ backlog, setBacklog }){
  const cols = ["Backlog","To Do","In Progress","Done"];
  const byCol = (c) => backlog.filter(b=>b.status===c).sort((a,b)=>a.rank-b.rank);
  const moveItem = (id, toStatus) => setBacklog(backlog.map(b=>b.id===id?{...b,status:toStatus}:b));
  const onDragStart = (e, id) => e.dataTransfer.setData("id", id);
  const onDrop = (e, status) => { const id=e.dataTransfer.getData("id"); if(id) moveItem(id, status); };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2"><Icon name="kanban"/> Backlog</h2>
          <p className="text-sm text-slate-500">{backlog.length} items · drag cards between columns</p>
        </div>
        <Btn icon={<Icon name="plus"/>} onClick={()=>setBacklog([{id:uid("B"), title:"New backlog item", epic:"New", priority:"Should", pts:3, status:"Backlog", rank:backlog.length+1}, ...backlog])}>Add</Btn>
      </div>
      <div className="grid grid-cols-4 gap-3">
        {cols.map(c=>(
          <div key={c} className="bg-slate-50 border border-slate-200 rounded-xl p-3 min-h-[380px]"
            onDragOver={e=>e.preventDefault()} onDrop={e=>onDrop(e,c)}>
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-semibold text-slate-700 uppercase">{c}</div>
              <span className="chip chip-muted">{byCol(c).length}</span>
            </div>
            <div className="space-y-2">
              {byCol(c).map(b=>(
                <div key={b.id} draggable onDragStart={e=>onDragStart(e, b.id)}
                     className="bg-white border border-slate-200 rounded-lg p-3 cursor-grab hover:border-indigo-300 shadow-sm">
                  <div className="flex items-center justify-between">
                    <span className="text-[10px] font-mono text-slate-500">{b.id}</span>
                    <span className={priorityChip(b.priority)}>{b.priority}</span>
                  </div>
                  <div className="mt-1 text-sm font-medium text-slate-800 leading-tight">{b.title}</div>
                  <div className="mt-2 flex items-center justify-between text-[11px] text-slate-500">
                    <span>{b.epic}</span>
                    <span className="px-1.5 py-0.5 rounded bg-slate-100 font-semibold">{b.pts} pts</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/*─────────────────────────────────────────────────────────────────────
  COVERAGE MODULE (qa)
─────────────────────────────────────────────────────────────────────*/
function CoverageModule({ tests, stories }){
  const byStory = {};
  stories.forEach(s => { byStory[s.id] = {story:s, Pass:0, Fail:0, Pending:0, total:0}; });
  tests.forEach(t => {
    const b = byStory[t.storyRef]; if (!b) return;
    b.total++; b[t.result] = (b[t.result]||0) + 1;
  });
  const rows = Object.values(byStory);
  const covered = rows.filter(r=>r.total>0).length;
  const passed = rows.filter(r=>r.total>0 && r.Pass===r.total).length;
  const pct = stories.length ? Math.round(covered/stories.length*100) : 0;
  const passPct = stories.length ? Math.round(passed/stories.length*100) : 0;
  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2"><Icon name="kanban"/> Coverage</h2>
          <p className="text-sm text-slate-500">{covered}/{stories.length} stories have ≥1 test · {pct}% covered · {passPct}% fully green</p>
        </div>
      </div>
      <div className="bg-white border border-slate-200 rounded-xl shadow-card overflow-hidden">
        <table className="matrix w-full">
          <thead><tr>
            <th>Story</th><th>Priority</th><th>Tests</th><th>Pass</th><th>Fail</th><th>Pending</th><th>Status</th>
          </tr></thead>
          <tbody>
            {rows.map(r=>{
              const state = r.total===0 ? "uncovered" : r.Fail>0 ? "fail" : r.Pending>0 ? "partial" : "green";
              const chipCls = state==="green"?"chip-good":state==="fail"?"chip-red":state==="partial"?"chip-warn":"chip-muted";
              const label = state==="green"?"Covered":state==="fail"?"Failing":state==="partial"?"Partial":"Uncovered";
              return (
                <tr key={r.story.id}>
                  <td><span className="font-mono text-[11px] text-slate-500">{r.story.id}</span> {r.story.story.slice(0,70)}{r.story.story.length>70?"…":""}</td>
                  <td><span className={priorityChip(r.story.priority)}>{r.story.priority}</span></td>
                  <td>{r.total}</td>
                  <td className="text-emerald-700 font-semibold">{r.Pass||0}</td>
                  <td className="text-red-700 font-semibold">{r.Fail||0}</td>
                  <td className="text-amber-700 font-semibold">{r.Pending||0}</td>
                  <td><span className={"chip "+chipCls}>{label}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const TASK_STATUSES = ["Not Started","In Progress","Blocked","Done"];

function taskStatusChip(s){
  if (s==="Done") return "chip chip-good";
  if (s==="In Progress") return "chip chip-ind";
  if (s==="Blocked") return "chip chip-red";
  return "chip chip-muted";
}
function sevChip(s){
  if (s==="high") return "chip chip-red";
  if (s==="medium") return "chip chip-warn";
  return "chip chip-muted";
}
function confidenceChip(c){
  if (c==="high") return "chip chip-good";
  if (c==="medium") return "chip chip-warn";
  return "chip chip-muted";
}
function rollupStatus(plan){
  const ts = plan.tasks || [];
  if (!ts.length) return "Not Started";
  if (ts.some(t=>t.status==="Blocked")) return "Blocked";
  if (ts.every(t=>t.status==="Done")) return "Done";
  if (ts.some(t=>t.status==="In Progress") || ts.some(t=>t.status==="Done")) return "In Progress";
  return "Not Started";
}
function planProgress(plan){
  const ts = plan.tasks || [];
  if (!ts.length) return 0;
  const done = ts.filter(t=>t.status==="Done").length;
  return Math.round(done/ts.length*100);
}
function fnColor(fn){
  const map = {
    UI:"bg-pink-50 text-pink-700 border-pink-200",
    Dev:"bg-indigo-50 text-indigo-700 border-indigo-200",
    QA:"bg-emerald-50 text-emerald-700 border-emerald-200",
    Legal:"bg-amber-50 text-amber-700 border-amber-200",
    Compliance:"bg-violet-50 text-violet-700 border-violet-200",
    Ops:"bg-cyan-50 text-cyan-700 border-cyan-200",
    Finance:"bg-slate-100 text-slate-700 border-slate-200",
    Marketing:"bg-rose-50 text-rose-700 border-rose-200",
    Data:"bg-sky-50 text-sky-700 border-sky-200"
  };
  return map[fn] || "bg-slate-100 text-slate-700 border-slate-200";
}

function buildStatusReportFallback(execution, stories){
  const today = new Date().toISOString().slice(0,10);
  const L = [];
  L.push(`# Execution Status Report — ${today}`);
  L.push("");
  const allTasks = execution.flatMap(p => p.tasks || []);
  const done = allTasks.filter(t=>t.status==="Done").length;
  const inProg = allTasks.filter(t=>t.status==="In Progress").length;
  const blocked = allTasks.filter(t=>t.status==="Blocked").length;
  const notStarted = allTasks.filter(t=>t.status==="Not Started").length;
  L.push(`**Overall:** ${allTasks.length} tasks across ${execution.length} stories · ${done} done · ${inProg} in progress · ${blocked} blocked · ${notStarted} not started.`);
  L.push(`**Completion:** ${allTasks.length ? Math.round(done/allTasks.length*100):0}%`);
  L.push("");
  const highRisks = execution.flatMap(p => (p.risks||[]).filter(r=>!r.dismissed && r.sev==="high").map(r=>({r, sid:p.storyId})));
  L.push(`## Active High-Severity Risks (${highRisks.length})`);
  if (!highRisks.length) L.push("_None._");
  highRisks.forEach(({r, sid})=>{
    L.push(`- **${sid}** · ${r.msg}`);
    L.push(`  - _Mitigation:_ ${r.mit}`);
  });
  L.push("");
  L.push(`## Per-Story Status`);
  execution.forEach(p => {
    const story = stories.find(s => s.id === p.storyId);
    const title = story ? story.story.slice(0, 90) : p.storyId;
    const pct = planProgress(p);
    const status = rollupStatus(p);
    L.push(`### ${p.storyId} · ${status} · ${pct}% complete`);
    L.push(`> ${title}`);
    const blk = (p.tasks||[]).filter(t=>t.status==="Blocked");
    if (blk.length){
      L.push(`**Blocked:** ${blk.map(t=>`${t.fn} — ${t.scope}`).join("; ")}`);
    }
    L.push("");
  });
  L.push("---");
  L.push(`_Generated by RPOS Execution · AI PM mode_`);
  return L.join("\n");
}

function buildReplanFallback(execution, stories){
  const L = [];
  L.push(`# Re-plan Suggestions`);
  L.push("");
  L.push(`The AI PM scanned ${execution.length} execution plans and surfaced the following re-plan opportunities:`);
  L.push("");
  // Heuristic 1: Could-priority stories can slip
  const coulds = execution.filter(p => {
    const s = stories.find(st=>st.id===p.storyId);
    return s && s.priority === "Could";
  });
  if (coulds.length){
    L.push(`## Deferrable to next release`);
    coulds.forEach(p => {
      const s = stories.find(st=>st.id===p.storyId);
      L.push(`- **${p.storyId}** (${s.priority}) — ${(p.tasks||[]).length} tasks · can slip to R2/R3 without MVP impact`);
    });
    L.push("");
  }
  // Heuristic 2: Blocked tasks = schedule risk
  const blocked = execution.flatMap(p => (p.tasks||[]).filter(t=>t.status==="Blocked").map(t=>({t, sid:p.storyId})));
  if (blocked.length){
    L.push(`## Active schedule blockers`);
    blocked.forEach(({t, sid}) => {
      L.push(`- **${sid} · ${t.fn}** — ${t.scope}`);
      L.push(`  - Owner: ${t.owner || "unassigned"} · Est: ${t.est}d`);
    });
    L.push("");
  }
  // Heuristic 3: Hidden dependency reversals
  L.push(`## Sequencing recommendations`);
  L.push(`- **US-001** — Compliance (DLT registration) is currently blocked; kick off day 1 regardless of Dev readiness. DLT lead time is 5–15 working days.`);
  L.push(`- **US-005** — Finance reconciliation workflow should precede partner-app cash capture. Reorder T-005-09 before T-005-04 to avoid rework.`);
  L.push(`- **US-008** — Audit trail must land with first reorder PO, not after. It's a launch blocker for finance reconciliation.`);
  L.push("");
  L.push(`_Review these with the PM before applying. Re-plan is advisory, not auto-applied._`);
  return L.join("\n");
}

function TeamLoadView({ execution }){
  // Tally per owner
  const byOwner = {};
  execution.forEach(p => {
    (p.tasks||[]).forEach(t => {
      const o = (t.owner || "unassigned").trim();
      if (!byOwner[o]) byOwner[o] = { active:0, total:0, days:0, blocked:0, fns:new Set() };
      byOwner[o].total += 1;
      if (t.status==="In Progress") byOwner[o].active += 1;
      if (t.status==="Blocked") byOwner[o].blocked += 1;
      if (t.status!=="Done") byOwner[o].days += Number(t.est) || 0;
      byOwner[o].fns.add(t.fn);
    });
  });
  const rows = Object.entries(byOwner).sort((a,b)=>b[1].days - a[1].days);
  return (
    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <div className="px-4 py-2 text-[11px] text-slate-500 border-b border-slate-100">
        Per-owner load across all in-flight stories. Red rows = over 5 days of open commitment.
      </div>
      <table className="w-full text-left text-[12px]">
        <thead>
          <tr className="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-100/60">
            <th className="px-3 py-2">Owner</th>
            <th className="px-3 py-2">Functions</th>
            <th className="px-3 py-2 text-center">Active</th>
            <th className="px-3 py-2 text-center">Blocked</th>
            <th className="px-3 py-2 text-center">Total</th>
            <th className="px-3 py-2 text-center">Open Days</th>
            <th className="px-3 py-2">Load</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(([owner, v])=>{
            const overloaded = v.days > 5;
            const pct = Math.min(100, v.days/10*100);
            return (

function RisksRail({ execution, onDismiss, stories }){
  const allRisks = execution.flatMap(p => (p.risks||[]).map(r => ({...r, storyId: p.storyId})))
    .filter(r => !r.dismissed);
  const bySev = { high: [], medium: [], low: [] };
  allRisks.forEach(r => (bySev[r.sev] || bySev.low).push(r));
  const order = ["high","medium","low"];
  const total = allRisks.length;
  return (
    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-100 bg-gradient-to-r from-amber-50/60 to-rose-50/40 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <Icon name="flag" className="w-4 h-4 text-amber-600"/>
          <div>
            <div className="text-sm font-semibold text-slate-900">Active Risks</div>
            <div className="text-[10px] text-slate-500">AI PM continuously re-scans · {total} active</div>
          </div>
        </div>
      </div>
      <div className="max-h-[620px] overflow-auto scroll-thin divide-y divide-slate-100">
        {total === 0 && (
          <div className="p-4 text-[12px] text-slate-500">No active risks. 🎉</div>
        )}
        {order.flatMap(sev => bySev[sev].map(r => (
          <div key={r.id} className="p-3 hover:bg-slate-50/50">
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <span className={sevChip(r.sev)}>{r.sev}</span>
              <span className="chip chip-ind">{r.type.replace(/_/g," ")}</span>
              <span className="text-[10px] font-mono text-slate-500 ml-auto">{r.storyId}</span>
            </div>
            <div className="text-[12px] text-slate-800 leading-snug">{r.msg}</div>
            {r.mit && <div className="text-[11px] text-slate-500 italic mt-1">Mitigation: {r.mit}</div>}
            <div className="flex justify-end mt-2">
              <button onClick={()=>onDismiss(r.storyId, r.id)}
                className="text-[10px] text-slate-400 hover:text-slate-700">dismiss</button>
            </div>
          </div>
        )))}
      </div>
    </div>
  );
}

function ExecutionModule({ execution, setExecution, stories }){
  const [view, setView] = useState("board");
  const [expandedIds, setExpandedIds] = useState(()=>new Set([execution[0]?.storyId].filter(Boolean)));
  const [aiModal, setAiModal] = useState(null); // { title, text, source } | null
  const [loadingAI, setLoadingAI] = useState(false);

  const toggle = (id) => {
    setExpandedIds(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  };
  const updatePlan = (nextPlan) => {
    setExecution(execution.map(p => p.storyId === nextPlan.storyId ? nextPlan : p));
  };
  const dismissRisk = (storyId, riskId) => {
    setExecution(execution.map(p =>
      p.storyId !== storyId ? p :
      {...p, risks: p.risks.map(r => r.id===riskId ? {...r, dismissed:true} : r)}
    ));
  };
  const expandAll = () => setExpandedIds(new Set(execution.map(p=>p.storyId)));
  const collapseAll = () => setExpandedIds(new Set());

  const onGenerateStatus = async () => {
    setLoadingAI(true);
    const fallback = () => buildStatusReportFallback(execution, stories);
    const res = await callLLM({ prompt:"Generate execution status report from current plan state", fallback });
    setLoadingAI(false);
    setAiModal({ title:"Weekly Status Report", text:res.text, source:res.source });
  };
  const onReplan = async () => {
    setLoadingAI(true);
    const fallback = () => buildReplanFallback(execution, stories);
    const res = await callLLM({ prompt:"Suggest re-plan moves given current plan state", fallback });
    setLoadingAI(false);
    setAiModal({ title:"Re-plan Suggestions", text:res.text, source:res.source });
  };

  const totalTasks = execution.flatMap(p => p.tasks||[]).length;
  const doneTasks  = execution.flatMap(p => p.tasks||[]).filter(t=>t.status==="Done").length;
  const blockedTasks = execution.flatMap(p => p.tasks||[]).filter(t=>t.status==="Blocked").length;
  const highRisks = execution.flatMap(p => p.risks||[]).filter(r=>!r.dismissed && r.sev==="high").length;

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <div className="flex items-center gap-2 mb-1">
            <div className="w-7 h-7 rounded-md bg-gradient-to-br from-indigo-500 to-cyan-400 text-white text-[11px] font-bold flex items-center justify-center">AI</div>
            <h2 className="text-lg font-semibold text-slate-900">Execution · AI Project Manager</h2>
          </div>
          <p className="text-[12px] text-slate-500">
            Decomposes each story into a cross-functional task plan · tracks status · surfaces risks · generates status reports.
          </p>
        </div>
        <div className="flex items-center gap-2">
          <Btn size="sm" variant="subtle" onClick={expandAll}>Expand all</Btn>
          <Btn size="sm" variant="subtle" onClick={collapseAll}>Collapse</Btn>
          <Btn size="sm" variant="subtle" icon={<Icon name="sparkles"/>} onClick={onReplan}>Re-plan release</Btn>
          <Btn size="sm" variant="primary" icon={<Icon name="doc"/>} onClick={onGenerateStatus}>Generate status report</Btn>
        </div>
      </div>

      {/* Execution KPI strip (module-local) */}
      <div className="grid grid-cols-4 gap-2">
        {[
          { label:"Tasks", value: `${doneTasks}/${totalTasks}`, tone:"bg-slate-100 text-slate-700" },
          { label:"Completion", value: totalTasks ? Math.round(doneTasks/totalTasks*100)+"%" : "—", tone:"bg-emerald-50 text-emerald-700" },
          { label:"Blocked", value: blockedTasks, tone: blockedTasks ? "bg-red-50 text-red-700" : "bg-slate-100 text-slate-500" },
          { label:"High-sev risks", value: highRisks, tone: highRisks ? "bg-amber-50 text-amber-700" : "bg-slate-100 text-slate-500" }
        ].map(c=>(
          <div key={c.label} className="bg-white border border-slate-200 rounded-lg p-3">
            <div className={cls("chip mb-1.5", c.tone)}>{c.label}</div>
            <div className="text-lg font-bold text-slate-900">{c.value}</div>
          </div>
        ))}
      </div>

      {/* Main grid: views + risks rail */}
      <div className="grid grid-cols-12 gap-4">
        <div className="col-span-8">
          {/* View tabs */}
          <div className="flex items-center gap-1 mb-3 bg-white border border-slate-200 rounded-xl p-1 w-fit shadow-sm">
            {[["board","Sprint Board","kanban"],["timeline","Timeline","bolt"],["load","Team Load","users"]].map(([id, label, icon])=>(
              <div key={id} className={cls("module-tab", view===id && "active")} onClick={()=>setView(id)}>
                <span className="inline-flex items-center gap-2"><Icon name={icon} className="w-3.5 h-3.5"/>{label}</span>
              </div>
            ))}
          </div>

          {view === "board" && (
            <div className="space-y-2">
              {execution.map(plan => {
                const story = stories.find(s => s.id === plan.storyId);
                return (
                  <StoryPlanCard key={plan.storyId}
                    plan={plan} story={story}
                    onPlanChange={updatePlan}
                    expanded={expandedIds.has(plan.storyId)}
                    onToggle={()=>toggle(plan.storyId)} />
                );
              })}
            </div>
          )}
          {view === "timeline" && <TimelineView execution={execution} stories={stories}/>}
          {view === "load"     && <TeamLoadView execution={execution}/>}
        </div>
        <div className="col-span-4">
          <RisksRail execution={execution} stories={stories} onDismiss={dismissRisk}/>
        </div>
      </div>

      {loadingAI && <div className="toast">AI PM is thinking…</div>}
      {aiModal && <AIModal {...aiModal} onClose={()=>setAiModal(null)}/>}
    </div>
  );
}

function DashboardStrip({ project, activeStageName }){
  const { stories, backlog, personas, tests, kpis, execution } = project;
  const totalPts = stories.reduce((a,s)=>a+s.points,0);
  const donePts = stories.filter(s=>s.status==="Done").reduce((a,s)=>a+s.points,0);
  const mustCount = stories.filter(s=>s.priority==="Must").length;
  const atRisk = backlog.filter(b=>b.priority==="Must" && (b.status==="To Do"||b.status==="Backlog")).length;
  const testPass = tests.filter(t=>t.result==="Pass").length;
  // AI PM execution rollup
  const execTasks = (execution||[]).flatMap(pl=>pl.tasks||[]);
  const execDone  = execTasks.filter(t=>t.status==="Done").length;
  const execBlk   = execTasks.filter(t=>t.status==="Blocked").length;
  const execRisks = (execution||[]).flatMap(pl=>(pl.risks||[]).filter(r=>!r.dismissed)).length;
  const execPct   = execTasks.length ? Math.round((execDone/execTasks.length)*100) : 0;
  const execLabel = execTasks.length ? `${execPct}% · ${execBlk?`${execBlk} blkd`:`${execRisks} risk${execRisks===1?"":"s"}`}` : "—";
  const cards = [
    { label:"SDLC Stage", value:activeStageName, tone:"indigo" },
    { label:"Personas", value:personas.length, tone:"cyan" },
    { label:"User Stories", value:stories.length + " · " + totalPts + "pts", tone:"slate" },
    { label:"Completion", value: totalPts? Math.round(donePts/totalPts*100)+"%":"—", tone:"green" },
    { label:"Must-haves", value:mustCount, tone:"amber" },
    { label:"At-risk Musts", value:atRisk, tone:atRisk>3?"red":"slate" },
    { label:"AI PM Exec", value: execLabel, tone: execBlk>0?"red":(execTasks.length?"violet":"slate") },
    { label:"Tests Pass", value: tests.length ? `${testPass}/${tests.length}` : "—", tone:"green" },
    { label:"KPIs", value: kpis.length, tone:"pink" }
  ];
  const tones = { indigo:"bg-indigo-50 text-indigo-700", cyan:"bg-cyan-50 text-cyan-700", slate:"bg-slate-100 text-slate-700", green:"bg-emerald-50 text-emerald-700", amber:"bg-amber-50 text-amber-700", red:"bg-red-50 text-red-700", pink:"bg-pink-50 text-pink-700", violet:"bg-violet-50 text-violet-700" };
  return (
    <div className="grid grid-cols-9 gap-2 mb-4">
      {cards.map(c=>(
        <div key={c.label} className="bg-white border border-slate-200 rounded-lg p-3">
          <div className={cls("chip mb-2", tones[c.tone])}>{c.label}</div>
          <div className="text-base font-bold text-slate-900 truncate">{c.value}</div>
        </div>
      ))}
    </div>
  );
}

  const [present, setPresent] = useState(false);
  const [savedAt, setSavedAt] = useState("just now");

  // Persist on every workspace change
  useEffect(()=>{
    saveWorkspace(ws);
    const now = new Date();
    setSavedAt(now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}));
  }, [ws]);

  const cur = ws.projects.find(p=>p.id===ws.currentId) || ws.projects[0];

  const updateProject = (patch) =>
    setWs(w => ({...w, projects: w.projects.map(p => p.id===w.currentId ? {...p, ...patch} : p)}));

  const setActiveStage = (id) => {
    const stage = SDLC_STAGES.find(s=>s.id===id);
    const firstModule = (stage && stage.modules[0]) || cur.activeModule;
    updateProject({ activeStage: id, activeModule: firstModule });
  };
  const setActiveModule = (m) => updateProject({ activeModule: m });

  const newProject = (name) => {
    const p = makeBlankProject(name);
    setWs(w => ({ currentId: p.id, projects: [...w.projects, p] }));
  };
  const selectProject = (id) => setWs(w => ({...w, currentId: id}));
  const renameProject = (name) => updateProject({ name });
  const deleteProject = () => setWs(w => {
    const remaining = w.projects.filter(p=>p.id!==w.currentId);
    if (!remaining.length){ const seed = makeProjectState("CSPO Grocery Online"); return { currentId: seed.id, projects: [seed] }; }
    return { currentId: remaining[0].id, projects: remaining };
  });

  // PRD regeneration
  const prd = useMemo(()=>generatePRD(cur),
    [cur.problem, cur.strategy, cur.personas, cur.stories, cur.backlog, cur.storyMap,
     cur.wireframes, cur.flows, cur.sprints, cur.execution, cur.architecture, cur.tests, cur.release, cur.kpis, cur.name]);

  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(null), 2000); };

  const handleExport = (type) => {
    if (type === "copy") { navigator.clipboard.writeText(prd); showToast("Copied markdown to clipboard"); return; }
    showToast(`Exporting ${type.toUpperCase()}…`);
    exportAs(type, { prd, project: cur }).then(msg => showToast(msg)).catch(err => showToast("Export failed: " + err));
  };

  // Stage progress heuristic for sidebar indicators
  const stageProgress = useMemo(() => {
    const sig = (arr) => (arr && arr.length) ? "done" : "empty";
    const map = {};
    map.discovery    = (cur.strategy.vision && (cur.problem.statement || cur.personas.length)) ? "done" : (cur.personas.length ? "partial" : "empty");
    map.requirements = cur.stories.length && cur.backlog.length ? "done" : cur.stories.length ? "partial" : "empty";
    map.design       = (cur.wireframes.length && cur.flows.length) ? "done" : (cur.wireframes.length || cur.flows.length) ? "partial" : "empty";
    {
      const execCount = (cur.execution||[]).length;
      const hasSprints = cur.sprints.length;
      const hasArch = cur.architecture && cur.architecture.summary;
      map.development = (hasSprints && hasArch && execCount) ? "done"
        : (hasSprints || execCount) ? "partial" : "empty";
    }
    map.qa           = cur.tests.filter(t=>t.result==="Pass").length >= Math.max(1, Math.floor(cur.tests.length*0.6)) && cur.tests.length ? "done" : (cur.tests.length ? "partial" : "empty");
    map.deployment   = cur.release.releases.length ? "done" : "empty";
    map.metrics      = cur.kpis.length ? "done" : "empty";
    return map;
  }, [cur]);

  const stageMeta = SDLC_STAGES.find(s=>s.id===cur.activeStage) || SDLC_STAGES[0];
  const moduleName = (MODULE_META[cur.activeModule] || {}).name || "—";
  const activeModules = stageMeta.modules;

  return (
    <div className="flex h-full">
      <Sidebar active={cur.activeStage} setActive={setActiveStage} stageProgress={stageProgress}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar
          ws={ws}
          onSelect={selectProject} onNew={newProject} onRename={renameProject} onDelete={deleteProject}
          onExport={handleExport} onPresent={()=>setPresent(true)}
          moduleName={moduleName} savedAt={savedAt}
        />
        <div className="flex-1 grid grid-cols-12 min-h-0">
          <main className="col-span-8 overflow-auto scroll-thin p-6 bg-slate-50 dotgrid">
            <div className="text-xs text-slate-500 mb-3 flex items-center gap-2 flex-wrap">
              <span className="chip chip-ind">SDLC · {stageMeta.name}</span>
              {stageMeta.sub.map(s=><span key={s} className="chip chip-muted">{s}</span>)}
            </div>
            <DashboardStrip project={cur} activeStageName={stageMeta.name} />
            <div className="flex items-center gap-1 mb-4 bg-white border border-slate-200 rounded-xl p-1 w-fit shadow-sm flex-wrap">
              {activeModules.map(id=>{
                const meta = MODULE_META[id] || {name:id, icon:"doc"};
                return (
                  <div key={id} className={cls("module-tab", cur.activeModule===id && "active")} onClick={()=>setActiveModule(id)}>
                    <span className="inline-flex items-center gap-2"><Icon name={meta.icon} className="w-3.5 h-3.5"/>{meta.name}</span>
                  </div>
                );
              })}
            </div>

            {cur.activeModule==="problem"      && <ProblemModule problem={cur.problem} setProblem={v=>updateProject({problem:v})} />}
            {cur.activeModule==="strategy"     && <StrategyModule strategy={cur.strategy} setStrategy={v=>updateProject({strategy:v})} />}
            {cur.activeModule==="personas"     && <PersonasModule personas={cur.personas} setPersonas={v=>updateProject({personas:v})} />}
            {cur.activeModule==="stories"      && <StoriesModule stories={cur.stories} setStories={v=>updateProject({stories:v})} personas={cur.personas} />}
            {cur.activeModule==="backlog"      && <BacklogModule backlog={cur.backlog} setBacklog={v=>updateProject({backlog:v})} />}
            {cur.activeModule==="map"          && <StoryMapModule storyMap={cur.storyMap} setStoryMap={v=>updateProject({storyMap:v})} />}
            {cur.activeModule==="wireframes"   && <WireframesModule wireframes={cur.wireframes} setWireframes={v=>updateProject({wireframes:v})} personas={cur.personas} />}
            {cur.activeModule==="flows"        && <FlowsModule flows={cur.flows} setFlows={v=>updateProject({flows:v})} />}
            {cur.activeModule==="sprints"      && <SprintsModule sprints={cur.sprints} setSprints={v=>updateProject({sprints:v})} />}
            {cur.activeModule==="execution"    && <ExecutionModule execution={cur.execution} setExecution={v=>updateProject({execution:v})} stories={cur.stories} />}
            {cur.activeModule==="architecture" && <ArchitectureModule architecture={cur.architecture} setArchitecture={v=>updateProject({architecture:v})} />}
            {cur.activeModule==="testplan"     && <TestPlanModule tests={cur.tests} setTests={v=>updateProject({tests:v})} stories={cur.stories} />}
            {cur.activeModule==="coverage"     && <CoverageModule tests={cur.tests} stories={cur.stories} />}
            {cur.activeModule==="release"      && <ReleasePlanModule release={cur.release} setRelease={v=>updateProject({release:v})} />}
            {cur.activeModule==="kpis"         && <KPIsModule kpis={cur.kpis} setKpis={v=>updateProject({kpis:v})} />}
          </main>
          <section className="col-span-4 min-w-0">
            <PRDPreview prd={prd} onExport={handleExport} onCopy={()=>handleExport("copy")}/>
          </section>
        </div>
      </div>
      {present && <PresentOverlay prd={prd} onClose={()=>setPresent(false)} />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
